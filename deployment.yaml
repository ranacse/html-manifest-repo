apiVersion: apps/v1
kind: Deployment
metadata:
  name: html-app-deployment
  labels:
    app: html-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: html-app
  template:
    metadata:
      labels:
        app: html-app
    spec:
      containers:
      - name: html-app-container
        # নিচের ইমেজ লিংকে আপনার নিজের ACR এর নাম বসাতে হবে না, 
        # পাইপলাইন রান করার সময় অটোমেটিক এটি আপডেট হয়ে যাবে।
        image: htmlappacr.azurecr.io/html-app:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: html-app-service
spec:
  type: NodePort
  selector:
    app: html-app
  ports:
    - port: 80
      targetPort: 80
      # আমরা ভিডিওর মতো একটি নির্দিষ্ট পোর্ট ফিক্সড করে দিচ্ছি যাতে অ্যাক্সেস করতে সুবিধা হয়
      nodePort: 31000
